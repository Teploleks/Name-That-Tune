<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай Мелодию - Pro Studio</title>
    <script src="peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #0d0d0d; --red: #e63946; --gold: #ffeb3b; --overlay: rgba(0,0,0,0.96); --card: #2a2a2a; }
        body { background: var(--bg); background-image: linear-gradient(#1a1a1a 1px, transparent 1px); background-size: 100% 24px; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .game-header { text-align: center; padding: 20px 0 10px 0; pointer-events: none; }
        .game-logo { font-size: 36px; font-weight: bold; color: var(--red); text-shadow: 0 0 15px rgba(230,57,70,0.6); text-transform: uppercase; letter-spacing: 2px; }
        .dev-mark { position: fixed; bottom: 10px; right: 15px; font-size: 12px; color: #444; z-index: 500; font-family: monospace; }
        #settings-trigger { position: fixed; top: 15px; right: 15px; z-index: 1000; background: #333; border: 1px solid #444; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; opacity: 0.8; }
        #network-status { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 15px; border: 2px solid #444; display: flex; align-items: center; gap: 20px; z-index: 1001; cursor: move; user-select: none; width: fit-content; height: fit-content; resize: none; overflow: hidden; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); z-index: 999; display: flex; justify-content: center; overflow-y: auto; padding: 40px; box-sizing: border-box; }
        .admin-panel { background: #1a1a1a; padding: 40px; border-radius: 20px; width: 100%; max-width: 1400px; border: 2px solid var(--red); height: fit-content; }
        .tab-content { border-top: 1px solid #333; padding-top: 25px; margin-top: 25px; }
        h1, h3 { color: var(--red); margin: 0 0 15px 0; text-transform: uppercase; }
        input[type="text"], input[type="number"], textarea { background: #111; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; outline: none; box-sizing: border-box; }
        textarea { width: 100%; height: 60px; margin-top: 5px; resize: vertical; }
        input[type="file"] { background: #222; color: #aaa; padding: 5px; border-radius: 4px; border: 1px solid #333; font-size: 12px; min-width: 250px; }
        .save-btn { background: #2ecc71; color: white; width: 100%; font-size: 22px; margin-top: 40px; padding: 20px; border: none; font-weight: bold; cursor: pointer; border-radius: 12px; }
        .screen { display: flex; flex-direction: column; align-items: center; gap: 30px; padding: 10px 20px 40px 20px; }
        .nav-bar { display: flex; gap: 15px; background: rgba(26, 26, 26, 0.8); backdrop-filter: blur(5px); padding: 10px; border-radius: 12px; border: 1px solid #333; }
        .nav-bar button { padding: 12px 25px; background: #333; border: none; color: white; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .nav-bar button.active-nav { background: var(--red); }
        .game-grid { display: grid; gap: 15px; }
        .cat-label { background: linear-gradient(180deg, #e63946 0%, #941b24 100%); padding: 15px; border-radius: 30px; font-weight: bold; text-align: center; min-width: 180px; text-transform: uppercase; border: 1px solid #ff5f6d; }
        .note-btn { background: #3d3d3d; border: 2px solid #666; border-radius: 50px; width: 100px; height: 75px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 6px 0 #000; transition: transform 0.1s; }
        .note-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
        .note-btn.active { background: var(--red); border-color: #ff5f6d; }
        .note-btn.played { opacity: 0.2; background: #111; cursor: default; box-shadow: none; border-color: #222; }
        .note-icon { font-size: 35px; color: var(--gold); }
        .note-value { font-size: 28px; font-weight: bold; display: none; }
        .note-btn.active .note-value, .note-btn.played .note-value { display: block; }
        .players-board { display: flex; gap: 35px; justify-content: center; width: 100%; border-top: 1px solid #333; padding-top: 40px; }
        .p-card { width: 180px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .p-avatar-wrap { width: 110px; height: 110px; border-radius: 50%; border: 4px solid #444; overflow: hidden; background: #222; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        @keyframes gold-pulse { 0% { box-shadow: 0 0 15px #fff, 0 0 30px var(--gold), 0 0 45px var(--gold), 0 0 60px #ff9f43; } 50% { box-shadow: 0 0 20px #fff, 0 0 40px var(--gold), 0 0 60px var(--gold), 0 0 80px #ff9f43; } 100% { box-shadow: 0 0 15px #fff, 0 0 30px var(--gold), 0 0 45px var(--gold), 0 0 60px #ff9f43; } }
        .p-card.buzzed .p-avatar-wrap { border-color: var(--gold); transform: scale(1.1); animation: gold-pulse 1.5s infinite; }
        .score-container { border: 2px solid #444; background: rgba(0,0,0,0.4); border-radius: 10px; width: 140px; overflow: hidden; }
        .score-input { background: transparent; border: none; color: var(--gold); font-size: 38px; font-weight: bold; width: 100%; text-align: center; outline: none; padding: 5px 0; }
        .auction-box { background: rgba(30,30,30,0.9); border: 3px solid var(--red); border-radius: 25px; padding: 40px; min-width: 550px; text-align: center; }
        .bid-value { font-size: 90px; font-weight: bold; color: var(--gold); }
        .hint-text { font-size: 28px; color: var(--gold); font-style: italic; margin-top: 20px; min-height: 40px; }
        .full-reset-btn { margin-top: 60px; background: #c0392b; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        .gold-title { color: var(--gold); font-size: 26px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="game-header">
    <div class="game-logo">Угадай Мелодию!</div>
</div>

<div class="dev-mark">Teploleks & Gemini, 2026</div>

<button id="settings-trigger" onclick="toggleAdmin()">⚙ НАСТРОЙКИ</button>

<div id="network-status">
    <div id="qrcode"></div>
    <div id="display-id" style="color:var(--gold); font-family:monospace; font-size:24px; font-weight:bold;">---</div>
</div>

<div id="admin-modal" class="modal">
    <div class="admin-panel">
        <h1>Панель Ведущего</h1>
        <div class="tab-content">
            <h3>1. Участники</h3>
            <div id="p-setup-area" style="display:flex; flex-wrap:wrap; gap:15px; margin-top:15px;"></div>
        </div>
        <div class="tab-content">
            <h3>2. Первый раунд</h3>
            Темы: <input type="number" id="r1-rows" value="3" style="width:50px"> 
            Мелодии: <input type="number" id="r1-cols" value="4" style="width:50px">
            <button onclick="genR1Setup()">Применить</button>
            <div id="r1-setup-area" style="display:grid; grid-template-columns: 1fr; gap:15px; margin-top:15px;"></div>
        </div>
        <div class="tab-content">
            <h3>3. Второй раунд</h3>
            Темы: <input type="number" id="r2-rows" value="3" style="width:50px"> 
            Мелодии: <input type="number" id="r2-cols" value="2" style="width:50px">
            <button onclick="genR2Setup()">Применить</button>
            <div id="r2-setup-area" style="display:grid; grid-template-columns: 1fr; gap:15px; margin-top:15px;"></div>
        </div>
        <div class="tab-content">
            <h3>4. Финал</h3>
            Мелодий: <input type="number" id="r3-count" value="3" style="width:50px"> <button onclick="genR3Setup()">Применить</button>
            <div id="r3-admin-playlist" style="margin-top:15px; background:#111; padding:15px; border-radius:10px; border:1px solid #333;"></div>
        </div>
        <button class="save-btn" onclick="applyAllSettings()">💾 СОХРАНИТЬ И ЗАПУСТИТЬ</button>
    </div>
</div>

<div id="game-screen" class="screen">
    <div class="nav-bar">
        <button id="nav-1" class="active-nav" onclick="switchRound(1)">РАУНД 1</button>
        <button id="nav-2" onclick="switchRound(2)">РАУНД 2</button>
        <button id="nav-3" onclick="switchRound(3)">ФИНАЛ</button>
        <button onclick="resetBuzzer()" style="background:#2ecc71; margin-left:20px;">СБРОС КНОПКИ</button>
    </div>
    <div id="r1-ui" style="display:flex; gap:40px; justify-content:center;">
        <div id="r1-grid" class="game-grid"></div>
        <div class="info-panel" style="width:300px; text-align:center; background:rgba(20,20,20,0.8); border:2px solid var(--red); padding:25px; border-radius:20px;">
            <div id="r1-answer-box" class="gold-title">...</div>
        </div>
    </div>
    <div id="r2-ui" class="screen hidden">
        <div id="r2-categories" style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;"></div>
        <div id="r2-active-display" class="auction-box hidden">
            <div id="r2-timer" style="font-size:24px;">30</div>
            <div id="r2-points" style="font-size:80px; color:var(--gold);">0</div>
            <button onclick="revealR2Title()" style="margin-top:15px; padding:10px 30px;">ОТВЕТ</button>
            <div id="r2-answer" class="gold-title"></div>
        </div>
    </div>
    <div id="r3-ui" class="screen hidden">
        <div class="auction-box">
            <div style="color:var(--gold); font-size:14px; letter-spacing:3px; font-weight:bold;">УГАДАЮ С...</div>
            <div style="display:flex; align-items:center; justify-content:center; gap:25px; margin:20px 0;">
                <button onclick="changeR3Bid(-1)" style="width:60px; height:60px; border-radius:50%; font-size:30px;">-</button>
                <div id="r3-bid" class="bid-value">7</div>
                <button onclick="changeR3Bid(1)" style="width:60px; height:60px; border-radius:50%; font-size:30px;">+</button>
            </div>
            <div id="r3-hint-display" class="hint-text">Ждем выбора мелодии...</div>
            <div style="margin-top:35px; display:flex; gap:20px; justify-content:center;">
                <button id="r3-play-btn" onclick="playR3Song()" style="background:var(--red); color:white; border:none; padding:18px 45px; border-radius:35px; font-weight:bold; cursor:pointer; font-size:18px;">ИГРАТЬ</button>
                <button onclick="revealR3Title()" style="background:#444; color:white; border:none; padding:15px 30px; border-radius:35px; cursor:pointer;">ОТВЕТ</button>
            </div>
            <div id="r3-answer" class="gold-title" style="display:none;"></div>
        </div>
    </div>
    <div id="scoreboard" class="players-board"></div>
    <button class="full-reset-btn" onclick="fullReset()">⚠️ ПОЛНЫЙ СБРОС ИГРЫ</button>
</div>

<script>
    let players = [], r1Data = [], r2Data = [], r3Data = [], currentAudio = null;
    let r2Interval, r2PointsInterval, r3Bid = 7, r3ActiveIdx = -1, peer;
    const placeholderSVG = `<svg viewBox="0 0 24 24" fill="white" width="60" height="60" style="opacity:0.3"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;
    let audioCtx = null;

    const dragPanel = document.getElementById('network-status');
    let isDragging = false, offset = [0,0];
    dragPanel.onmousedown = (e) => { isDragging = true; offset = [dragPanel.offsetLeft - e.clientX, dragPanel.offsetTop - e.clientY]; };
    document.onmousemove = (e) => { if (isDragging) { dragPanel.style.left = (e.clientX + offset[0]) + 'px'; dragPanel.style.top = (e.clientY + offset[1]) + 'px'; } };
    document.onmouseup = () => { isDragging = false; };

    function initNetworking() {
        const sid = Math.random().toString(36).substr(2, 4).toUpperCase();
        peer = new Peer(sid, { 
            host: '0.peerjs.com', port: 443, secure: true, debug: 1,
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
        });
        
        peer.on('open', id => { 
            document.getElementById('display-id').innerText = id; 
            const qrBox = document.getElementById("qrcode");
            qrBox.innerHTML = '';
            new QRCode(qrBox, { text: id, width: 60, height: 60 }); 
        });

        peer.on('connection', c => {
            c.on('data', data => {
                if(data.action === 'REGISTER') {
                    const existingIdx = players.findIndex(p => p.connId === c.peer);
                    const playerData = { name: data.name, score: 0, img: data.img || '', connId: c.peer };
                    if(existingIdx === -1) players.push(playerData); else players[existingIdx] = playerData;
                    buildScoreboard();
                }
                if(data.action === 'BUZZ') {
                    const idx = players.findIndex(p => p.connId === c.peer);
                    if(idx !== -1) triggerBuzzer(idx);
                }
            });
        });

        peer.on('disconnected', () => { peer.reconnect(); });
        peer.on('error', err => console.error("Peer Error:", err));
    }

    function playBuzzSound() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
        osc1.type = 'sine'; osc1.frequency.setValueAtTime(330, now); osc1.frequency.exponentialRampToValueAtTime(660, now + 0.1);
        gain1.gain.setValueAtTime(0.2, now); gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc1.connect(gain1); gain1.connect(audioCtx.destination);
        osc1.start(now); osc1.stop(now + 0.4);
    }

    function triggerBuzzer(idx) {
        if(currentAudio && !currentAudio.paused) {
            currentAudio.pause();
            clearInterval(r2Interval); clearInterval(r2PointsInterval);
            playBuzzSound();
            document.querySelectorAll('.p-card').forEach((c, i) => { if(i === idx) c.classList.add('buzzed'); });
        }
    }

    function resetBuzzer() { document.querySelectorAll('.p-card').forEach(c => c.classList.remove('buzzed')); }
    function toggleAdmin() { document.getElementById('admin-modal').classList.toggle('hidden'); }

    function genR1Setup() {
        const rows = document.getElementById('r1-rows').value, cols = document.getElementById('r1-cols').value, area = document.getElementById('r1-setup-area'); 
        area.innerHTML = '';
        for(let i=0; i<rows; i++) {
            let b = document.createElement('div'); b.className = 'r1-cat-block'; b.style.background = '#222'; b.style.padding = '20px'; b.style.borderRadius = '12px'; b.style.border = '1px solid #444';
            b.innerHTML = `<strong>ТЕМА ${i+1}:</strong> <input type="text" class="r1-cat-name" placeholder="Название" style="width:300px; margin-bottom:15px;">`;
            for(let j=0; j<cols; j++) b.innerHTML += `<div style="display:flex; gap:10px; margin-top:8px;"><input type="number" class="r1-val" value="${(j+1)*10}" style="width:60px;"><input type="file" class="r1-file" style="flex-grow:1;"><input type="text" class="r1-title" placeholder="Ответ" style="width:200px;"></div>`;
            area.appendChild(b);
        }
    }

    function genR2Setup() {
        const rows = document.getElementById('r2-rows').value, cols = document.getElementById('r2-cols').value, area = document.getElementById('r2-setup-area'); 
        area.innerHTML = '';
        for(let i=0; i<rows; i++) {
            let b = document.createElement('div'); b.className = 'r2-cat-block'; b.style.background = '#222'; b.style.padding = '20px'; b.style.borderRadius = '12px'; b.style.border = '1px solid #444';
            b.innerHTML = `<strong>ТЕМА ${i+1}:</strong> <input type="text" class="r2-cat-name" placeholder="Название" style="width:300px; margin-bottom:15px;">`;
            for(let j=0; j<cols; j++) b.innerHTML += `<div style="display:flex; gap:10px; margin-top:8px;"><input type="file" class="r2-file" style="flex-grow:1;"><input type="text" class="r2-title" placeholder="Ответ" style="width:200px;"></div>`;
            area.appendChild(b);
        }
    }

    function genR3Setup() {
        const c = document.getElementById('r3-count').value, a = document.getElementById('r3-admin-playlist'); a.innerHTML = '';
        for(let i=0; i<c; i++) a.innerHTML += `<div class="r3-admin-item" style="border-bottom:1px solid #333; padding:15px 0;"><div style="display:flex; gap:10px;"><strong>№${i+1}</strong> <input type="file" class="r3-file-in" style="flex-grow:1;"> <input type="text" class="r3-title-in" placeholder="Ответ" style="width:250px;"></div><textarea class="r3-hint-in" placeholder="Текст подсказки..."></textarea></div>`;
    }

    function applyAllSettings() {
        const r3Items = document.querySelectorAll('.r3-admin-item');
        r3Data = Array.from(r3Items).map(b => {
            const f = b.querySelector('.r3-file-in').files[0];
            return { file: f ? URL.createObjectURL(f) : null, title: b.querySelector('.r3-title-in').value || "Без названия", hint: b.querySelector('.r3-hint-in').value || "Без подсказки" };
        });
        const r1Cols = document.getElementById('r1-cols').value;
        r1Data = []; const c1 = document.querySelectorAll('.r1-cat-name'), f1 = document.querySelectorAll('.r1-file'), t1 = document.querySelectorAll('.r1-title'), v1 = document.querySelectorAll('.r1-val');
        let idx1 = 0; c1.forEach(c => { let ns = []; for(let j=0; j<r1Cols; j++) { ns.push({ val: v1[idx1].value, file: f1[idx1].files[0] ? URL.createObjectURL(f1[idx1].files[0]) : null, title: t1[idx1].value }); idx1++; } r1Data.push({ name: c.value, notes: ns }); });
        const r2Cols = document.getElementById('r2-cols').value;
        r2Data = []; const c2 = document.querySelectorAll('.r2-cat-name'), f2 = document.querySelectorAll('.r2-file'), t2 = document.querySelectorAll('.r2-title');
        let idx2 = 0; c2.forEach(c => { let ss = []; for(let j=0; j<r2Cols; j++) { ss.push({ file: f2[idx2].files[0] ? URL.createObjectURL(f2[idx2].files[0]) : null, title: t2[idx2].value }); idx2++; } r2Data.push({ name: c.value, songs: ss, progress: 0 }); });
        buildR1(); buildR2(); buildScoreboard(); buildR3Menu();
        if(r3Data.length > 0) selectR3Melody(0);
        toggleAdmin();
    }

    function buildScoreboard() {
        const b = document.getElementById('scoreboard'); b.innerHTML = '';
        players.forEach((p, i) => {
            let av = p.img ? `<img src="${p.img}" class="p-avatar">` : placeholderSVG;
            b.innerHTML += `<div class="p-card">
                <div class="p-avatar-wrap">${av}</div>
                <div style="font-weight:bold; margin-bottom:5px;">${p.name}</div>
                <div class="score-container"><input type="number" class="score-input" value="${p.score}" onchange="players[${i}].score=parseInt(this.value)"></div>
            </div>`;
        });
    }

    function buildR1() {
        const g = document.getElementById('r1-grid'); g.innerHTML = ''; 
        if(!r1Data[0]) return;
        const cols = r1Data[0].notes.length; g.style.gridTemplateColumns = `auto repeat(${cols}, 110px)`;
        r1Data.forEach(row => {
            let l = document.createElement('div'); l.className = 'cat-label'; l.innerText = row.name; g.appendChild(l);
            row.notes.forEach(n => {
                let btn = document.createElement('div'); btn.className = 'note-btn'; btn.innerHTML = `<span class="note-icon">♫</span><span class="note-value">${n.val}</span>`;
                btn.onclick = () => {
                    if(btn.classList.contains('played')) return;
                    if(!btn.classList.contains('active')) {
                        if(currentAudio) currentAudio.pause(); resetBuzzer(); btn.classList.add('active');
                        document.getElementById('r1-answer-box').innerText = "Играет...";
                        if(n.file) { currentAudio = new Audio(n.file); currentAudio.play(); }
                    } else { btn.classList.replace('active', 'played'); document.getElementById('r1-answer-box').innerText = n.title; }
                };
                g.appendChild(btn);
            });
        });
    }

    function buildR2() {
        const c = document.getElementById('r2-categories'); c.innerHTML = '';
        r2Data.forEach((cat) => {
            let div = document.createElement('div'); div.className = 'cat-label'; div.style.cursor = "pointer"; div.innerHTML = `${cat.name} (${cat.songs.length - cat.progress})`;
            if(cat.progress >= cat.songs.length) div.style.opacity = "0.2";
            div.onclick = () => {
                if(cat.progress < cat.songs.length) {
                    const song = cat.songs[cat.progress]; cat.progress++;
                    if(currentAudio) currentAudio.pause(); resetBuzzer();
                    document.getElementById('r2-answer').innerText = song.title; document.getElementById('r2-answer').style.display='none';
                    document.getElementById('r2-active-display').classList.remove('hidden');
                    if(song.file) { currentAudio = new Audio(song.file); currentAudio.play(); startR2Logic(); }
                    buildR2();
                }
            };
            c.appendChild(div);
        });
    }

    function startR2Logic() {
        let secs = 30, pts = 0; clearInterval(r2Interval); clearInterval(r2PointsInterval);
        r2Interval = setInterval(() => { secs--; document.getElementById('r2-timer').innerText = secs; if(secs<=0) clearInterval(r2Interval); }, 1000);
        r2PointsInterval = setInterval(() => { pts += 10; document.getElementById('r2-points').innerText = pts; if(pts>=300) clearInterval(r2PointsInterval); }, 1000);
    }
    function revealR2Title() { if(currentAudio) currentAudio.pause(); document.getElementById('r2-answer').style.display = 'block'; }

    function buildR3Menu() {
        const area = document.getElementById('r3-admin-playlist'); area.innerHTML = '<h3>Финал:</h3>';
        r3Data.forEach((item, i) => {
            let div = document.createElement('div'); div.className = "r3-list-item";
            div.style.cursor="pointer"; div.style.padding="10px"; div.style.borderBottom="1px solid #333";
            div.innerHTML = `Мелодия №${i+1}: <strong>${item.title}</strong>`;
            div.onclick = () => selectR3Melody(i);
            area.appendChild(div);
        });
    }

    function selectR3Melody(i) {
        if (i < 0 || i >= r3Data.length) { r3ActiveIdx = -1; return; }
        r3ActiveIdx = i; r3Bid = 7; document.getElementById('r3-bid').innerText = 7;
        document.getElementById('r3-hint-display').innerText = r3Data[i].hint;
        document.getElementById('r3-answer').style.display = 'none';
    }

    function changeR3Bid(v) { r3Bid = Math.max(1, r3Bid + v); document.getElementById('r3-bid').innerText = r3Bid; }
    function playR3Song() {
        if(r3ActiveIdx === -1) return;
        const song = r3Data[r3ActiveIdx]; if(!song.file) return;
        if(currentAudio) currentAudio.pause(); resetBuzzer();
        currentAudio = new Audio(song.file); currentAudio.play();
        setTimeout(() => { if(currentAudio) currentAudio.pause(); }, r3Bid * 1000);
    }

    function revealR3Title() {
        if(currentAudio) currentAudio.pause();
        if(r3ActiveIdx !== -1) {
            document.getElementById('r3-answer').innerText = r3Data[r3ActiveIdx].title;
            document.getElementById('r3-answer').style.display = 'block';
            setTimeout(() => { selectR3Melody(r3ActiveIdx + 1); buildR3Menu(); }, 2000);
        }
    }

    function switchRound(r) {
        if(currentAudio) currentAudio.pause();
        document.getElementById('r1-ui').classList.toggle('hidden', r!==1);
        document.getElementById('r2-ui').classList.toggle('hidden', r!==2);
        document.getElementById('r3-ui').classList.toggle('hidden', r!==3);
        [1,2,3].forEach(i => document.getElementById('nav-'+i).classList.toggle('active-nav', r===i));
    }

    function fullReset() { if(confirm("Сбросить игру?")) location.reload(); }
    genR1Setup(); genR2Setup(); genR3Setup(); initNetworking();
</script>
</body>
</html>
