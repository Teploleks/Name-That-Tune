<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай Мелодию - Pro Studio</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #0d0d0d; --red: #e63946; --gold: #ffeb3b; --card: #2a2a2a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .game-header { text-align: center; padding: 20px 0; background: linear-gradient(to bottom, #1a1a1a, #0d0d0d); border-bottom: 2px solid var(--red); }
        .game-logo { font-size: 32px; font-weight: bold; color: var(--red); text-transform: uppercase; letter-spacing: 3px; }
        
        #network-status { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.9); padding: 10px; border-radius: 10px; border: 1px solid #444; z-index: 1000; display: flex; align-items: center; gap: 15px; }
        #qrcode img { border: 2px solid white; }
        
        .admin-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .setup-card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid var(--red); margin-bottom: 20px; }
        
        .screen { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-bar button { padding: 10px 20px; background: #333; border: none; color: white; border-radius: 5px; cursor: pointer; }
        .nav-bar button.active { background: var(--red); }

        .game-grid { display: grid; gap: 10px; margin-top: 20px; }
        .cat-label { background: var(--red); padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; }
        .note-btn { background: #333; border: 2px solid #555; height: 60px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; transition: 0.2s; }
        .note-btn.active { background: var(--red); border-color: white; transform: scale(1.05); }
        .note-btn.played { opacity: 0.3; background: #111; cursor: default; }

        .players-board { display: flex; gap: 20px; justify-content: center; width: 100%; margin-top: 40px; border-top: 1px solid #333; padding-top: 20px; }
        .p-card { background: #1a1a1a; padding: 15px; border-radius: 10px; border: 2px solid #444; text-align: center; min-width: 120px; transition: 0.3s; }
        .p-card.buzzed { border-color: var(--gold); box-shadow: 0 0 20px var(--gold); transform: translateY(-10px); }
        .score-input { background: transparent; border: none; color: var(--gold); font-size: 24px; font-weight: bold; width: 80px; text-align: center; }

        .hidden { display: none !important; }
        button.save-btn { background: #2ecc71; color: white; padding: 15px 40px; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; display: block; margin: 20px auto; }
    </style>
</head>
<body>

<div id="network-status">
    <div id="qrcode"></div>
    <div>ID: <span id="display-id" style="color:var(--gold); font-weight:bold; font-size:22px;">...</span></div>
    <button onclick="document.getElementById('admin-panel').classList.remove('hidden')">⚙ Настройки</button>
</div>

<div id="admin-panel" class="admin-modal">
    <h2 style="text-align:center; color:var(--red);">НАСТРОЙКИ ИГРЫ</h2>
    <div class="setup-card">
        <h3>Раунд 1: Темы и Мелодии</h3>
        <div id="r1-setup-area"></div>
        <button onclick="addR1Row()">+ Добавить тему</button>
    </div>
    <button class="save-btn" onclick="applySettings()">СОХРАНИТЬ И НАЧАТЬ</button>
</div>

<div id="game-screen" class="screen hidden">
    <div class="game-header"><div class="game-logo">Угадай Мелодию</div></div>
    
    <div class="nav-bar">
        <button id="btn-r1" class="active" onclick="showRound(1)">Раунд 1</button>
        <button id="btn-r2" onclick="showRound(2)">Раунд 2</button>
        <button id="btn-r3" onclick="showRound(3)">Финал</button>
        <button onclick="resetBuzzer()" style="background:#2ecc71; margin-left:20px;">Сброс кнопки</button>
    </div>

    <div id="r1-ui" class="screen">
        <div id="r1-grid" class="game-grid"></div>
        <h2 id="r1-answer" style="color:var(--gold); margin-top:20px;"></h2>
    </div>

    <div id="scoreboard" class="players-board"></div>
</div>

<script>
    let peer, players = [], r1Data = [], currentAudio = null;

    // Инициализация сети
    function initNetwork() {
        const sid = Math.random().toString(36).substr(2, 4).toUpperCase();
        peer = new Peer(sid, {
            host: '0.peerjs.com', port: 443, secure: true, debug: 1
        });

        peer.on('open', id => {
            document.getElementById('display-id').innerText = id;
            new QRCode(document.getElementById("qrcode"), { text: id, width: 60, height: 60 });
        });

        peer.on('connection', conn => {
            conn.on('data', data => {
                if (data.action === 'REGISTER') {
                    if (!players.find(p => p.connId === conn.peer)) {
                        players.push({ connId: conn.peer, name: data.name, score: 0 });
                        updateScoreboard();
                    }
                }
                if (data.action === 'BUZZ') {
                    handleBuzz(conn.peer);
                }
            });
        });
    }

    function handleBuzz(id) {
        if (currentAudio && !currentAudio.paused) {
            currentAudio.pause();
            updateScoreboard(id);
        }
    }

    function updateScoreboard(buzzedId = null) {
        const board = document.getElementById('scoreboard');
        board.innerHTML = '';
        players.forEach(p => {
            const card = document.createElement('div');
            card.className = `p-card ${p.connId === buzzedId ? 'buzzed' : ''}`;
            card.innerHTML = `
                <div style="font-weight:bold">${p.name}</div>
                <input type="number" class="score-input" value="${p.score}" onchange="updateScore('${p.connId}', this.value)">
            `;
            board.appendChild(card);
        });
    }

    function updateScore(id, val) {
        const p = players.find(p => p.connId === id);
        if (p) p.score = parseInt(val);
    }

    function resetBuzzer() { updateScoreboard(); }

    // Логика настройки первого раунда
    function addR1Row() {
        const area = document.getElementById('r1-setup-area');
        const row = document.createElement('div');
        row.style.marginBottom = "10px";
        row.innerHTML = `
            <input type="text" placeholder="Тема" class="r1-cat">
            <input type="file" class="r1-files" multiple>
            <input type="text" placeholder="Ответы (через запятую)" class="r1-titles" style="width:300px">
        `;
        area.appendChild(row);
    }

    function applySettings() {
        const cats = document.querySelectorAll('.r1-cat');
        const fileSets = document.querySelectorAll('.r1-files');
        const titleSets = document.querySelectorAll('.r1-titles');
        
        r1Data = [];
        cats.forEach((cat, i) => {
            const files = fileSets[i].files;
            const titles = titleSets[i].value.split(',');
            let notes = [];
            for(let j=0; j<files.length; j++) {
                notes.push({
                    file: URL.createObjectURL(files[j]),
                    title: titles[j] || "Без названия",
                    val: (j+1) * 10
                });
            }
            r1Data.push({ name: cat.value, notes: notes });
        });

        buildR1();
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
    }

    function buildR1() {
        const grid = document.getElementById('r1-grid');
        grid.innerHTML = '';
        if (r1Data.length === 0) return;
        
        grid.style.gridTemplateColumns = `150px repeat(${r1Data[0].notes.length}, 100px)`;

        r1Data.forEach(row => {
            const label = document.createElement('div');
            label.className = 'cat-label';
            label.innerText = row.name;
            grid.appendChild(label);

            row.notes.forEach(note => {
                const btn = document.createElement('div');
                btn.className = 'note-btn';
                btn.innerText = note.val;
                btn.onclick = () => {
                    if (btn.classList.contains('played')) return;
                    if (btn.classList.contains('active')) {
                        btn.classList.replace('active', 'played');
                        document.getElementById('r1-answer').innerText = note.title;
                    } else {
                        if (currentAudio) currentAudio.pause();
                        resetBuzzer();
                        btn.classList.add('active');
                        currentAudio = new Audio(note.file);
                        currentAudio.play();
                        document.getElementById('r1-answer').innerText = "Играет...";
                    }
                };
                grid.appendChild(btn);
            });
        });
    }

    initNetwork();
    addR1Row();
</script>
</body>
</html>
