<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай Мелодию - Pro Studio</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #0d0d0d; --red: #e63946; --gold: #ffeb3b; --overlay: rgba(0,0,0,0.96); --card: #2a2a2a; }
        
        body { 
            background: var(--bg); 
            background-image: linear-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 100% 24px;
            color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
        }
        
        #settings-trigger { position: fixed; top: 15px; right: 15px; z-index: 1000; background: #333; border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; opacity: 0.7; }
        #settings-trigger:hover { opacity: 1; background: var(--red); }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--overlay); z-index: 999; display: flex; justify-content: center; overflow-y: auto; padding: 40px; box-sizing: border-box; }
        .admin-panel { background: #1a1a1a; padding: 40px; border-radius: 20px; width: 100%; max-width: 1200px; border: 1px solid #444; height: fit-content; }
        .tab-content { border-top: 1px solid #333; padding-top: 25px; margin-top: 25px; }
        .r-setup-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; margin-top: 20px; }
        .setup-block { background: var(--card); padding: 20px; border-radius: 12px; border-left: 6px solid var(--red); }
        .setup-row { display: flex; flex-direction: column; gap: 8px; background: #333; padding: 10px; margin-top: 10px; border-radius: 6px; }
        
        input { background: #111; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; }
        .save-btn { background: #2ecc71; color: white; width: 100%; font-size: 22px; margin-top: 40px; padding: 20px; border: none; font-weight: bold; cursor: pointer; }

        .screen { display: flex; flex-direction: column; align-items: center; gap: 30px; padding: 40px 20px; position: relative; z-index: 1; }
        .nav-bar { display: flex; gap: 15px; background: rgba(26, 26, 26, 0.8); backdrop-filter: blur(5px); padding: 10px; border-radius: 12px; border: 1px solid #333; }
        .nav-bar button { padding: 12px 25px; background: #333; border: none; color: white; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .nav-bar button.active-nav { background: var(--red); }

        .r1-layout { display: flex; gap: 40px; align-items: flex-start; justify-content: center; width: 100%; max-width: 1300px; }
        .game-grid { display: grid; gap: 15px; }
        .info-panel { width: 320px; background: rgba(22, 22, 22, 0.9); border: 2px solid var(--red); border-radius: 15px; padding: 25px; text-align: center; min-height: 250px; display: flex; flex-direction: column; justify-content: center; backdrop-filter: blur(10px); }
        
        .cat-label { background: linear-gradient(180deg, #e63946 0%, #941b24 100%); padding: 15px; border-radius: 30px; font-weight: bold; text-align: center; min-width: 180px; text-transform: uppercase; border: 1px solid #ff5f6d; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .note-btn { background: rgba(42, 42, 42, 0.9); border: 2px solid #444; border-radius: 50px; width: 100px; height: 75px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 0 #000; transition: 0.1s; position: relative; }
        .note-btn.active { background: var(--red); border-color: #ff5f6d; }
        .note-btn.played { opacity: 0.3; background: #111; cursor: default; }
        
        .note-icon { font-size: 35px; color: var(--gold); }
        .note-value { font-size: 28px; font-weight: bold; display: none; }
        .note-btn.active .note-value, .note-btn.played .note-value { display: block; }
        .note-btn.active .note-icon, .note-btn.played .note-icon { display: none; }

        .players-board { display: flex; gap: 20px; justify-content: center; width: 100%; border-top: 2px solid rgba(255,255,255,0.05); padding-top: 40px; flex-wrap: wrap; }
        .p-card { background: rgba(26, 26, 26, 0.85); backdrop-filter: blur(5px); border: 2px solid #333; border-radius: 15px; padding: 20px; width: 170px; text-align: center; transition: 0.3s; }
        .p-card.buzzed { border-color: var(--gold) !important; box-shadow: 0 0 50px var(--gold); background: rgba(61, 53, 0, 0.9) !important; }
        
        .p-avatar-wrap { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--red); margin: 0 auto 15px; overflow: hidden; background: #222; display: flex; align-items: center; justify-content: center; }
        .p-avatar { width: 100%; height: 100%; object-fit: cover; }
        .p-avatar-placeholder { width: 50px; height: 50px; opacity: 0.3; }

        .score-input { background: transparent; border: none; color: var(--gold); font-size: 28px; font-weight: bold; width: 100px; text-align: center; margin: 5px 0; outline: none; }

        #network-status { position: fixed; bottom: 20px; left: 20px; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 15px; border: 1px solid #444; display: flex; align-items: center; gap: 20px; cursor: move; z-index: 1001; user-select: text; }
        #qrcode { background: white; padding: 5px; border-radius: 5px; }
        .hidden { display: none !important; }

        .gold-title { color: var(--gold); font-size: 26px; font-weight: bold; line-height: 1.3; margin-top: 15px; }

        .big-reset-btn {
            background: #2ecc71; border: none; color: white; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 0 #27ae60; transition: 0.1s;
        }
        .big-reset-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #27ae60; }
    </style>
</head>
<body>

<button id="settings-trigger" onclick="toggleAdmin()">⚙ НАСТРОЙКИ</button>

<div id="network-status">
    <div id="qrcode"></div>
    <div>
        <div style="font-size:11px; color:#888;">ID:</div>
        <div id="display-id" style="color:var(--gold); font-family:monospace; font-size:24px; font-weight:bold; user-select: text;">---</div>
    </div>
</div>

<div id="admin-modal" class="modal">
    <div class="admin-panel">
        <h1 style="color:var(--red); margin:0 0 20px 0;">Студия Настройки</h1>
        <div class="tab-content">
            <h3>1. Участники</h3>
            Количество игроков: <input type="number" id="p-count" value="3" onchange="genPSetup()">
            <div id="p-setup-area" style="display:flex; flex-wrap:wrap; gap:15px; margin-top:15px;"></div>
        </div>
        <div class="tab-content">
            <h3>2. Раунд 1</h3>
            Тем: <input type="number" id="r1-rows-count" value="3" style="width:50px"> 
            Нот в теме: <input type="number" id="r1-notes-count" value="4" style="width:50px">
            <button onclick="genR1Setup()">Применить структуру</button>
            <div id="r1-setup-area" class="r-setup-grid"></div>
        </div>
        <div class="tab-content">
            <h3>3. Раунд 2</h3>
            Тем: <input type="number" id="r2-cats-count" value="3" style="width:50px">
            Песен в теме: <input type="number" id="r2-songs-count" value="2" style="width:50px">
            <button onclick="genR2Setup()">Применить структуру</button>
            <div id="r2-setup-area" class="r-setup-grid"></div>
        </div>
        <button class="save-btn" onclick="applyAllSettings()">💾 СОХРАНИТЬ И НАЧАТЬ</button>
    </div>
</div>

<div id="game-screen" class="screen">
    <div class="nav-bar">
        <button id="nav-1" class="active-nav" onclick="switchRound(1)">РАУНД 1</button>
        <button id="nav-2" onclick="switchRound(2)">РАУНД 2</button>
        <button class="big-reset-btn" onclick="resetBuzzer()" style="margin-left: 20px;">СЛЕДУЮЩИЙ ХОД</button>
        <button onclick="fullResetGame()" style="background:#444; margin-left:20px;">СБРОС</button>
    </div>

    <div id="r1-ui" class="r1-layout">
        <div id="r1-grid" class="game-grid"></div>
        <div class="info-panel">
            <div style="font-size:12px; color:#555; margin-bottom:10px;">СЕЙЧАС ИГРАЕТ:</div>
            <div id="r1-answer-box" class="gold-title">...</div>
        </div>
    </div>

    <div id="r2-ui" class="screen hidden">
        <div id="r2-active-display" style="background:rgba(26,26,26,0.9); padding:40px; border-radius:20px; border:2px solid var(--red); text-align:center; min-width:400px; backdrop-filter: blur(10px);" class="hidden">
            <div id="r2-timer" style="font-size:24px; color:#ccc;">31</div>
            <div id="r2-points" style="font-size:90px; color:var(--gold); font-weight:bold;">0</div>
            <div id="r2-reveal-zone" style="margin-top:10px;"></div>
        </div>
        <div id="r2-categories" style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;"></div>
    </div>

    <div id="scoreboard" class="players-board"></div>
</div>

<script>
    let players = [], r1Data = [], r2Data = [], currentAudio = null;
    let r2Interval, r2PointsInterval, r2Secs = 31, r2CurrentScore = 0, r2FinalTitle = "";
    let peer;

    const placeholderSVG = `<svg class="p-avatar-placeholder" viewBox="0 0 24 24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;

    const dragItem = document.getElementById("network-status");
    let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

    dragItem.addEventListener("mousedown", dragStart);
    document.addEventListener("mousemove", drag);
    document.addEventListener("mouseup", dragEnd);

    function dragStart(e) { if (e.target.id === 'display-id') return; initialX = e.clientX - xOffset; initialY = e.clientY - yOffset; if (e.target === dragItem || dragItem.contains(e.target)) active = true; }
    function drag(e) { if (active) { e.preventDefault(); currentX = e.clientX - initialX; currentY = e.clientY - initialY; xOffset = currentX; yOffset = currentY; setTranslate(currentX, currentY, dragItem); } }
    function dragEnd() { active = false; }
    function setTranslate(xPos, yPos, el) { el.style.transform = `translate3d(${xPos}px, ${yPos}px, 0)`; }

    function playBuzzSound() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(140, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.4);
    }

    function generateShortId() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let result = ''; for (let i = 0; i < 4; i++) { result += chars.charAt(Math.floor(Math.random() * chars.length)); }
        return result;
    }

    function initNetworking() {
        const shortId = generateShortId();
        const config = {
            host: '0.peerjs.com', port: 443, secure: true,
            config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
        };
        peer = new Peer(shortId, config);
        peer.on('open', id => {
            document.getElementById('display-id').innerText = id;
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: id, width: 70, height: 70 });
        });
        peer.on('error', err => { if (err.type === 'unavailable-id') initNetworking(); });
        peer.on('connection', c => { c.on('data', data => { if(data.action === 'BUZZ') triggerBuzzer(data.playerIdx); }); });
    }

    function triggerBuzzer(idx) {
        if(currentAudio && !currentAudio.paused) {
            currentAudio.pause(); playBuzzSound();
            clearInterval(r2Interval); clearInterval(r2PointsInterval);
            const cards = document.querySelectorAll('.p-card');
            cards.forEach(c => c.classList.remove('buzzed'));
            if(cards[idx]) {
                cards[idx].classList.add('buzzed');
                if(!document.getElementById('r2-ui').classList.contains('hidden')) prepareRevealButton();
            }
        }
    }

    function resetBuzzer() { document.querySelectorAll('.p-card').forEach(c => c.classList.remove('buzzed')); }
    function toggleAdmin() { document.getElementById('admin-modal').classList.toggle('hidden'); }

    function genPSetup() {
        const c = document.getElementById('p-count').value, a = document.getElementById('p-setup-area');
        a.innerHTML = '';
        for(let i=0; i<c; i++) {
            a.innerHTML += `<div style="background:#222; padding:10px; border-radius:8px; border:1px solid #444;">
                <input type="text" class="p-name-in" value="Игрок ${i+1}" style="width:100px;"><br>
                <input type="file" class="p-img-in" style="width:150px; font-size:10px; margin-top:5px;">
            </div>`;
        }
    }

    function genR1Setup() {
        const rows = document.getElementById('r1-rows-count').value, notes = document.getElementById('r1-notes-count').value, area = document.getElementById('r1-setup-area');
        area.innerHTML = '';
        for(let i=0; i<rows; i++) {
            let b = document.createElement('div'); b.className = 'setup-block';
            let html = `<input type="text" class="r1-cat-name" value="Тема ${i+1}" style="width:90%; font-weight:bold; margin-bottom:10px;">`;
            for(let j=0; j<notes; j++) {
                html += `<div class="setup-row"><strong>Слот ${j+1}</strong> <span>Очки: <input type="number" class="r1-val" value="${(j+1)*10}" style="width:50px;"></span><input type="file" class="r1-file"><input type="text" class="r1-title" placeholder="Песня"></div>`;
            }
            b.innerHTML = html; area.appendChild(b);
        }
    }

    function genR2Setup() {
        const c = document.getElementById('r2-cats-count').value, s = document.getElementById('r2-songs-count').value, area = document.getElementById('r2-setup-area');
        area.innerHTML = '';
        for(let i=0; i<c; i++) {
            let b = document.createElement('div'); b.className = 'setup-block';
            let html = `<input type="text" class="r2-cat-name" value="Тема ${i+1}" style="width:90%; font-weight:bold; margin-bottom:10px;">`;
            for(let j=0; j<s; j++) {
                html += `<div class="setup-row"><strong>Песня ${j+1}</strong><input type="file" class="r2-file"><input type="text" class="r2-title" placeholder="Ответ"></div>`;
            }
            b.innerHTML = html; area.appendChild(b);
        }
    }

    function applyAllSettings() {
        const names = document.querySelectorAll('.p-name-in'), imgs = document.querySelectorAll('.p-img-in');
        players = Array.from(names).map((n, i) => ({ name: n.value, score: 0, img: imgs[i].files[0] ? URL.createObjectURL(imgs[i].files[0]) : '' }));
        r1Data = []; const cats = document.querySelectorAll('.r1-cat-name'), files = document.querySelectorAll('.r1-file'), titles = document.querySelectorAll('.r1-title'), vals = document.querySelectorAll('.r1-val');
        const nPerC = parseInt(document.getElementById('r1-notes-count').value); let idx = 0;
        cats.forEach(c => { let notes = []; for(let j=0; j<nPerC; j++) { notes.push({ val: vals[idx].value, file: files[idx].files[0] ? URL.createObjectURL(files[idx].files[0]) : null, title: titles[idx].value || "???" }); idx++; } r1Data.push({ name: c.value, notes }); });
        r2Data = []; const fCats = document.querySelectorAll('.r2-cat-name'), fFiles = document.querySelectorAll('.r2-file'), fTitles = document.querySelectorAll('.r2-title');
        const sPerFC = parseInt(document.getElementById('r2-songs-count').value); let fIdx = 0;
        fCats.forEach(c => { let songs = []; for(let j=0; j<sPerFC; j++) { songs.push({ file: fFiles[fIdx].files[0] ? URL.createObjectURL(fFiles[fIdx].files[0]) : null, title: fTitles[fIdx].value || "???" }); fIdx++; } r2Data.push({ name: c.value, songs, progress: 0 }); });
        buildR1(); buildR2(); buildScoreboard(); toggleAdmin();
    }

    function buildScoreboard() {
        const b = document.getElementById('scoreboard'); b.innerHTML = '';
        players.forEach((p, i) => {
            let avatarContent = p.img ? `<img src="${p.img}" class="p-avatar">` : placeholderSVG;
            b.innerHTML += `<div class="p-card" id="pcard-${i}"><div class="p-avatar-wrap">${avatarContent}</div><div style="font-weight:bold;">${p.name}</div><input type="number" class="score-input" value="${p.score}" onchange="updatePlayerScore(${i}, this.value)"><div style="display:flex; justify-content:center; gap:5px;"><button onclick="changeScore(${i}, -10)">-</button><button onclick="changeScore(${i}, 10)">+</button></div></div>`;
        });
    }

    function updatePlayerScore(i, val) { players[i].score = parseInt(val) || 0; }
    function changeScore(i, v) { players[i].score += v; document.querySelectorAll('.score-input')[i].value = players[i].score; }
    function switchRound(r) { if(currentAudio) currentAudio.pause(); document.getElementById('r1-ui').classList.toggle('hidden', r!==1); document.getElementById('r2-ui').classList.toggle('hidden', r!==2); document.getElementById('nav-1').classList.toggle('active-nav', r===1); document.getElementById('nav-2').classList.toggle('active-nav', r===2); }

    function buildR1() {
        const g = document.getElementById('r1-grid'); g.innerHTML = ''; const nPerC = r1Data[0] ? r1Data[0].notes.length : 0;
        g.style.gridTemplateColumns = `auto repeat(${nPerC}, 110px)`;
        r1Data.forEach(row => {
            let l = document.createElement('div'); l.className = 'cat-label'; l.innerText = row.name; g.appendChild(l);
            row.notes.forEach(note => {
                let btn = document.createElement('div'); btn.className = 'note-btn'; btn.innerHTML = `<span class="note-icon">♪</span><span class="note-value">${note.val}</span>`;
                btn.onclick = () => { if(btn.classList.contains('played')) return; if(currentAudio) currentAudio.pause(); resetBuzzer(); if(!btn.classList.contains('active')) { btn.classList.add('active'); document.getElementById('r1-answer-box').innerText = "Слушаем..."; if(note.file) { currentAudio = new Audio(note.file); currentAudio.play(); } } else { btn.classList.replace('active', 'played'); document.getElementById('r1-answer-box').innerText = note.title; } };
                g.appendChild(btn);
            });
        });
    }

    function buildR2() {
        const c = document.getElementById('r2-categories'); c.innerHTML = '';
        r2Data.forEach((cat, i) => {
            let div = document.createElement('div'); div.className = 'cat-label'; div.style.cursor = "pointer"; div.innerHTML = `${cat.name} <br> <small>(${cat.songs.length - cat.progress})</small>`; if(cat.progress >= cat.songs.length) div.style.opacity = "0.2";
            div.onclick = () => { if(cat.progress < cat.songs.length) { const song = cat.songs[cat.progress]; r2FinalTitle = song.title; cat.progress++; if(currentAudio) currentAudio.pause(); resetBuzzer(); if(song.file) { currentAudio = new Audio(song.file); currentAudio.play(); startR2Logic(); } buildR2(); } };
            c.appendChild(div);
        });
    }

    function startR2Logic() {
        r2Secs = 31; r2CurrentScore = 0; document.getElementById('r2-active-display').classList.remove('hidden'); document.getElementById('r2-points').innerText = "0"; prepareRevealButton();
        clearInterval(r2Interval); clearInterval(r2PointsInterval);
        r2Interval = setInterval(() => { r2Secs--; document.getElementById('r2-timer').innerText = Math.max(0, r2Secs); if(r2Secs <= 0) stopR2Song(); }, 1000);
        r2PointsInterval = setInterval(() => { if(r2CurrentScore < 300) { r2CurrentScore += 10; document.getElementById('r2-points').innerText = r2CurrentScore; } }, 1000);
    }

    function prepareRevealButton() { document.getElementById('r2-reveal-zone').innerHTML = `<button onclick="revealR2Title()" style="background:var(--red); color:white; border:none; padding:10px 30px; font-weight:bold; border-radius:30px; cursor:pointer; border: 1px solid #ff5f6d;">ОТВЕТ</button>`; }
    function revealR2Title() { stopR2Song(); resetBuzzer(); document.getElementById('r2-reveal-zone').innerHTML = `<div class="gold-title">${r2FinalTitle}</div>`; }
    function stopR2Song() { clearInterval(r2Interval); clearInterval(r2PointsInterval); if(currentAudio) currentAudio.pause(); }
    function fullResetGame() { if(!confirm("Сбросить прогресс и очки?")) return; players.forEach(p => p.score = 0); buildScoreboard(); document.querySelectorAll('.note-btn').forEach(b => b.classList.remove('active', 'played')); document.getElementById('r1-answer-box').innerText = "..."; r2Data.forEach(c => c.progress = 0); document.getElementById('r2-active-display').classList.add('hidden'); buildR2(); resetBuzzer(); if(currentAudio) currentAudio.pause(); }

    genPSetup(); genR1Setup(); genR2Setup(); initNetworking();
</script>
</body>
</html>
