<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Пульт</title>
    <script src="peerjs.min.js"></script>
    <style>
        body { background: #0d0d0d; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; width: 80%; }
        input { padding: 15px; width: 100%; box-sizing: border-box; margin: 10px 0; border-radius: 10px; border: none; font-size: 18px; }
        #buzz-btn { width: 200px; height: 200px; border-radius: 50%; background: #e63946; border: 10px solid #941b24; color: white; font-size: 30px; font-weight: bold; display: none; margin: 20px auto; }
        #status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="setup" class="container">
    <h2>ВХОД В ИГРУ</h2>
    <input type="text" id="game-id" placeholder="ID ИГРЫ (4 БУКВЫ)" maxlength="4" style="text-transform: uppercase;">
    <input type="text" id="p-name" placeholder="ВАШЕ ИМЯ">
    <button onclick="connect()" style="padding: 15px 30px; background: #2ecc71; color: white; border: none; border-radius: 10px; font-weight: bold; width: 100%;">ПОДКЛЮЧИТЬСЯ</button>
    <div id="status">Готов</div>
</div>

<button id="buzz-btn" onclick="sendBuzz()">ЖМИ!</button>

<script>
    let peer, conn;

    function connect() {
        const gid = document.getElementById('game-id').value.toUpperCase();
        const name = document.getElementById('p-name').value;
        const status = document.getElementById('status');

        if (!gid || !name) return alert("Заполни все поля!");

        status.innerText = "Подключение к сети...";
        peer = new Peer({ host: '0.peerjs.com', port: 443, secure: true });

        peer.on('open', () => {
            status.innerText = "Ищу игру " + gid + "...";
            conn = peer.connect(gid);
            
            conn.on('open', () => {
                conn.send({ action: 'REGISTER', name: name });
                document.getElementById('setup').style.display = 'none';
                document.getElementById('buzz-btn').style.display = 'block';
            });

            conn.on('error', (err) => { status.innerText = "Ошибка: " + err; });
        });

        peer.on('error', (err) => { 
            status.innerText = "Ошибка сети: " + err.type;
            console.error(err);
        });
    }

    function sendBuzz() {
        if (conn && conn.open) {
            conn.send({ action: 'BUZZ' });
            const btn = document.getElementById('buzz-btn');
            btn.style.background = "#ffeb3b";
            setTimeout(() => btn.style.background = "#e63946", 200);
        }
    }
</script>
</body>
</html>
